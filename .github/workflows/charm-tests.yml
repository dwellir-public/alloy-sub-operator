name: Charm Tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  charm-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Install Charmcraft
        run: sudo snap install charmcraft --classic --channel latest/stable

      - name: Run charm static tests
        run: |
          uv sync --group dev
          tox -e format
          tox -e lint
          tox -e static
          tox -e unit
          charmcraft pack
